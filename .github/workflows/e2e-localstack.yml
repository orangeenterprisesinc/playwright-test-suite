name: E2E (full local stack)

# Boots the ENTIRE PET Tiger app inside the runner so that http://localhost:3000
# actually exists in this job, then runs the Playwright suite against it. This is
# the only way "localhost" tests can run in CI — you cannot reach your PC's
# localhost from GitHub; the runner has to serve the app itself.
#
# Stack brought up here: SQL Server (restored from .bak) + MinIO + Gotenberg +
# Go API (:8080) + web dev server (:3000).
#
# Runs on push to main (plus manual/on-demand). This is heavy (minutes per run)
# and depends on a private DB backup, so it is intentionally NOT run on every
# branch/PR — only on commits that land on main.
on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types:
      - run-e2e-localstack

# Never run two heavy stacks at once; a newer push to main supersedes an
# in-flight run.
concurrency:
  group: e2e-localstack-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Full-stack E2E
    runs-on: ubuntu-latest
    timeout-minutes: 40

    # ── SQL Server as a service container ──────────────────────────────────────
    # SA password is a throwaway for this ephemeral runner; kept in a secret so it
    # isn't hard-coded, but it never touches real infra.
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: ${{ secrets.CI_MSSQL_SA_PASSWORD }}
          MSSQL_PID: Developer
        ports:
          - 1433:1433

    env:
      # --- App DB connection (points the API at the service container) ---
      MSSQL_SERVER: localhost
      MSSQL_PORT: "1433"
      MSSQL_DB: PetData
      MSSQL_USER: sa
      MSSQL_PASSWORD: ${{ secrets.CI_MSSQL_SA_PASSWORD }}
      MSSQL_ENCRYPT: "false"
      MSSQL_TRUST_SERVER_CERTIFICATE: "true"
      # --- Object storage / PDF (from compose.dev.yml) ---
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_BUCKET: pet-tiger-dev
      S3_ACCESS_KEY: minioadmin
      S3_SECRET: minioadmin
      S3_USE_PATH_STYLE: "true"
      GOTENBERG_URL: http://localhost:3010
      # --- Misc app config ---
      API_PORT: "8080"
      WEB_PORT: "3000"
      PT_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
      PT_IMPORT_WORKER_DISABLED: "true"
      PT_EXPORT_WORKER_DISABLED: "true"
      PT_EXPORT_SCHEDULER_DISABLED: "true"
      # --- Playwright target (overrides env.local; the framework's envLoader
      #     never clobbers an already-set process env var, so these secrets win) ---
      TEST_ENV: local
      BASE_URL: http://localhost:3000
      # Accept either secret naming scheme: the PW_-prefixed names this file
      # documented originally, or the USERNAME/PASSWORD secrets that actually
      # exist in the repo today.
      USER_NAME: ${{ secrets.PW_USER_NAME || secrets.USERNAME }}
      PASSWORD: ${{ secrets.PW_PASSWORD || secrets.PASSWORD }}
      # --- Email notification (opt-in): set the SEND_EMAIL repo variable to
      #     'yes' and add the SMTP_*/EMAIL_* secrets to activate it. With the
      #     variable unset the reporter logs one line and does nothing. ---
      SEND_EMAIL: ${{ vars.SEND_EMAIL || 'no' }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

    steps:
      # 1) Sources ---------------------------------------------------------------
      - name: Checkout test suite (this repo)
        uses: actions/checkout@v4
        with:
          path: test-suite

      - name: Checkout app (web-pet)
        uses: actions/checkout@v4
        with:
          repository: orangeenterprisesinc/web-pet
          token: ${{ secrets.WEB_PET_TOKEN }}
          path: app

      # 2) Toolchains ------------------------------------------------------------
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-go@v5
        with:
          go-version-file: app/apps/api/go.mod
          cache-dependency-path: app/apps/api/go.sum

      # 3) Restore the database backup(s) ---------------------------------------
      # Fetches every .bak attached to a private release in web-pet, then restores
      # each into the mssql container. Restore is dynamic: it reads the logical
      # file names + original DB name from the backup header, so we don't need to
      # hard-code them. Restores TigerMaster (users/auth) AND client DBs (PetData).
      - name: Download DB backups
        env:
          GH_TOKEN: ${{ secrets.WEB_PET_TOKEN }}
        run: |
          mkdir -p "$RUNNER_TEMP/bak"
          # Adjust --tag to wherever you attach the .bak assets in web-pet.
          gh release download "${{ vars.DB_BACKUP_TAG || 'ci-db-fixture' }}" \
            --repo orangeenterprisesinc/web-pet \
            --pattern '*.bak' \
            --dir "$RUNNER_TEMP/bak"
          ls -lh "$RUNNER_TEMP/bak"

      - name: Wait for SQL Server
        run: |
          for i in $(seq 1 60); do
            if docker exec "${{ job.services.mssql.id }}" \
                 /opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa \
                 -P "$MSSQL_PASSWORD" -Q "SELECT 1" >/dev/null 2>&1; then
              echo "SQL Server is up."; exit 0
            fi
            echo "waiting for SQL Server ($i)…"; sleep 3
          done
          echo "::error::SQL Server did not become ready"; exit 1

      - name: Restore databases
        run: |
          set -euo pipefail
          CID="${{ job.services.mssql.id }}"
          SQL() { docker exec -i "$CID" /opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P "$MSSQL_PASSWORD" -h -1 -W "$@"; }

          # Copy backups into the container.
          docker exec "$CID" mkdir -p /var/opt/mssql/backup
          for f in "$RUNNER_TEMP"/bak/*.bak; do
            docker cp "$f" "$CID:/var/opt/mssql/backup/$(basename "$f")"
          done

          for f in "$RUNNER_TEMP"/bak/*.bak; do
            BAK="/var/opt/mssql/backup/$(basename "$f")"
            echo "── Restoring $BAK ─────────────────────────────"

            # Original DB name from the backup header.
            DBNAME=$(SQL -Q "SET NOCOUNT ON; SELECT TOP 1 DatabaseName FROM (RESTORE HEADERONLY FROM DISK=N'$BAK') AS h;" | tr -d '\r' | sed '/^$/d' | head -n1)
            echo "Database: '$DBNAME'"

            # Build MOVE clauses for every logical file → container data dir.
            MOVES=$(SQL -Q "SET NOCOUNT ON; SELECT LogicalName + N'|' + [Type] FROM (RESTORE FILELISTONLY FROM DISK=N'$BAK') AS fl;" \
              | tr -d '\r' | sed '/^$/d' | while IFS='|' read -r logical type; do
                  logical="$(echo "$logical" | xargs)"; type="$(echo "$type" | xargs)"
                  if [ "$type" = "L" ]; then ext="ldf"; else ext="mdf"; fi
                  printf "MOVE N'%s' TO N'/var/opt/mssql/data/%s_%s.%s', " "$logical" "$DBNAME" "$logical" "$ext"
                done)

            SQL -Q "RESTORE DATABASE [$DBNAME] FROM DISK=N'$BAK' WITH ${MOVES} REPLACE, RECOVERY;"
            echo "Restored [$DBNAME]."
          done

          echo "── Databases present ──"
          SQL -Q "SET NOCOUNT ON; SELECT name FROM sys.databases;"

      # 4) Supporting services (MinIO + Gotenberg) ------------------------------
      - name: Start MinIO + Gotenberg
        working-directory: app
        run: |
          docker compose -f compose.dev.yml up -d
          # Give MinIO's healthcheck a moment; the bucket-init job is one-shot.
          sleep 10
          docker compose -f compose.dev.yml ps

      # 5) Migrations + API ------------------------------------------------------
      - name: Write API .env
        working-directory: app/apps/api
        run: |
          cat > .env <<EOF
          API_PORT=$API_PORT
          MSSQL_SERVER=$MSSQL_SERVER
          MSSQL_PORT=$MSSQL_PORT
          MSSQL_DB=$MSSQL_DB
          MSSQL_USER=$MSSQL_USER
          MSSQL_PASSWORD=$MSSQL_PASSWORD
          MSSQL_ENCRYPT=$MSSQL_ENCRYPT
          MSSQL_TRUST_SERVER_CERTIFICATE=$MSSQL_TRUST_SERVER_CERTIFICATE
          S3_ENDPOINT=$S3_ENDPOINT
          S3_REGION=$S3_REGION
          S3_BUCKET=$S3_BUCKET
          S3_ACCESS_KEY=$S3_ACCESS_KEY
          S3_SECRET=$S3_SECRET
          S3_USE_PATH_STYLE=$S3_USE_PATH_STYLE
          GOTENBERG_URL=$GOTENBERG_URL
          PT_ALLOWED_ORIGINS=$PT_ALLOWED_ORIGINS
          PT_IMPORT_WORKER_DISABLED=$PT_IMPORT_WORKER_DISABLED
          PT_EXPORT_WORKER_DISABLED=$PT_EXPORT_WORKER_DISABLED
          PT_EXPORT_SCHEDULER_DISABLED=$PT_EXPORT_SCHEDULER_DISABLED
          EOF

      - name: Run DB migrations (idempotent)
        working-directory: app/apps/api
        run: go run ./cmd/migrate up --target all

      - name: Start API
        working-directory: app/apps/api
        run: |
          go run ./cmd/server > "$RUNNER_TEMP/api.log" 2>&1 &
          echo "API_PID=$!" >> "$GITHUB_ENV"
          # All API routes are mounted under /api (see cmd/server/main.go),
          # so the public health probe is /api/health.
          for i in $(seq 1 40); do
            if curl -sf "http://localhost:$API_PORT/api/health" >/dev/null 2>&1; then
              echo "API is up."; exit 0
            fi
            echo "waiting for API ($i)…"; sleep 3
          done
          echo "::error::API did not become ready"; cat "$RUNNER_TEMP/api.log"; exit 1

      # 6) Web dev server --------------------------------------------------------
      - name: Install web deps
        working-directory: app
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Start web (Vite dev server)
        working-directory: app
        run: |
          pnpm --filter @pet-tiger/web dev > "$RUNNER_TEMP/web.log" 2>&1 &
          for i in $(seq 1 40); do
            if curl -sf "http://localhost:3000/login" >/dev/null 2>&1; then
              echo "Web is up."; exit 0
            fi
            echo "waiting for web ($i)…"; sleep 3
          done
          echo "::error::Web did not become ready"; cat "$RUNNER_TEMP/web.log"; exit 1

      # 7) The tests -------------------------------------------------------------
      - name: Install test-suite deps
        working-directory: test-suite
        run: npm ci

      - name: Install Playwright browsers
        working-directory: test-suite
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        working-directory: test-suite
        run: npx playwright test

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-suite/playwright-report

      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: |
            ${{ runner.temp }}/api.log
            ${{ runner.temp }}/web.log
