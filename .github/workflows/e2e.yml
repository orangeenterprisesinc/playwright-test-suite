name: E2E

# Runs the Playwright suite against whatever BASE_URL resolves to via the
# framework's own env loading (env.<TEST_ENV> + .env — see src/config/envLoader.ts).
# No app is booted here: this repo's own env.<name> files (or CI secrets) are
# the single source of truth for the target URL. Point BASE_URL at a real
# dev/QA/staging environment there, not in this workflow.
#
# Runs on push to main, a daily 4pm IST schedule, manual dispatch, and
# repository_dispatch (fired externally, e.g. when the app repo pushes code).
on:
  push:
    branches: [main]
  schedule:
    # 4:00 PM IST = 10:30 AM UTC (IST is UTC+5:30). GitHub's cron scheduler
    # runs in UTC always — adjust this if IST's offset ever changes.
    - cron: '30 10 * * *'
  workflow_dispatch:
  repository_dispatch:
    types:
      - run-e2e-localstack

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Accept either secret naming scheme: PW_-prefixed, or the plain
      # USERNAME/PASSWORD secrets that actually exist in the repo today.
      USER_NAME: ${{ secrets.PW_USER_NAME || secrets.USERNAME }}
      PASSWORD: ${{ secrets.PW_PASSWORD || secrets.PASSWORD }}
      # --- Email notification (opt-in): set the SEND_EMAIL repo variable to
      #     'yes' and add the SMTP_*/EMAIL_* secrets to activate it. With the
      #     variable unset the reporter logs one line and does nothing. ---
      SEND_EMAIL: ${{ vars.SEND_EMAIL || 'no' }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

    steps:
      - name: Checkout test suite
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java (for Allure report generation)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install test-suite deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      # Restores the previous run's trend data so the report's Trend/Graphs
      # widgets extend instead of resetting on every run. Keyed by run id (so
      # every run saves a fresh entry) with a branch-prefixed restore-keys
      # fallback (so it picks up the most recent entry on that branch).
      - name: Restore Allure history
        if: always()
        uses: actions/cache@v4
        with:
          path: allure-report/history
          key: allure-history-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            allure-history-${{ github.ref_name }}-

      # The email reporter (when SEND_EMAIL=yes) already generates this from
      # allure-results/ before attaching it, but regenerating here is cheap
      # and idempotent — it guarantees the artifact below exists even when
      # email is off, and regardless of whether the test step above failed.
      - name: Generate Allure report
        if: always()
        run: node scripts/generate-allure-report.js

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
