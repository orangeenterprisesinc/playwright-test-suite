name: Playwright QE Automation

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to test
        required: true
        default: DEV
        type: choice
        options:
          - DEV
      suite:
        description: Test suite to run
        required: true
        default: Regression
        type: choice
        options:
          - Regression

  repository_dispatch:
    types:
      - run-playwright

jobs:
  playwright-tests:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps

      - run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results
