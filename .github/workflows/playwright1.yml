name: Playwright QE Automation

# Manual / on-demand only. These tests drive a running PET Tiger deployment
# (web + Go API + SQL Server + MinIO). CI does NOT boot that stack, so the
# suite can only run against a URL you point it at. There is intentionally no
# push/pull_request trigger: nothing here should gate merges.
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: >
          Base URL of a reachable PET Tiger deployment (e.g.
          https://qa.pet-tiger.example.com). Leave blank to skip the run.
        required: false
        default: ''
      env_name:
        description: Which env-files/.env.<name> to load for non-secret config
        required: true
        default: qa
        type: choice
        options:
          - qa
          - dev

  repository_dispatch:
    types:
      - run-playwright

jobs:
  playwright-tests:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ENV_NAME: ${{ github.event.inputs.env_name || 'qa' }}
      # A URL passed at dispatch time wins; otherwise fall back to the repo
      # secret PW_BASE_URL (set this once a real environment exists).
      BASE_URL: ${{ github.event.inputs.base_url || secrets.PW_BASE_URL }}
      # Credentials come from secrets, never from the checked-in env files.
      USER_NAME: ${{ secrets.PW_USER_NAME }}
      PASSWORD: ${{ secrets.PW_PASSWORD }}

    steps:
      - name: Preflight — is a target environment reachable?
        id: preflight
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "::notice title=No environment::No BASE_URL provided (dispatch input blank and PW_BASE_URL secret unset). Nothing to test — skipping the suite. This is expected until a deployment exists."
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Checking $BASE_URL/login ..."
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "$BASE_URL/login" || echo 000)
          if [ "$code" = "000" ]; then
            echo "::error title=Environment unreachable::Could not reach $BASE_URL/login (connection failed/timed out). Confirm the deployment is up and the URL is correct."
            exit 1
          fi
          echo "::notice title=Environment reachable::$BASE_URL/login responded with HTTP $code."
          echo "run_tests=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.preflight.outputs.run_tests == 'true'

      - uses: actions/setup-node@v4
        if: steps.preflight.outputs.run_tests == 'true'
        with:
          node-version: 24
          cache: npm

      - run: npm ci
        if: steps.preflight.outputs.run_tests == 'true'

      - run: npx playwright install --with-deps
        if: steps.preflight.outputs.run_tests == 'true'

      - run: npx playwright test
        if: steps.preflight.outputs.run_tests == 'true'

      - uses: actions/upload-artifact@v4
        if: always() && steps.preflight.outputs.run_tests == 'true'
        with:
          name: playwright-report
          path: playwright-report

      - uses: actions/upload-artifact@v4
        if: always() && steps.preflight.outputs.run_tests == 'true'
        with:
          name: test-results
          path: test-results
