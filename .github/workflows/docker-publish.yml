name: Publish Docker image

# Builds the Playwright automation suite (Dockerfile at repo root) and
# publishes it to GitHub Container Registry so it can be shared via
# `docker pull` instead of everyone building it locally.
#
# Uses the built-in GITHUB_TOKEN — no separate registry account or secret
# needed. After the first successful push, the package defaults to private;
# make it public from the package's own settings page on GitHub if it needs
# to be pullable without authentication.
on:
  push:
    branches: [dev-qe]
    paths:
      - Dockerfile
      - .dockerignore
      - package.json
      - package-lock.json
      - src/**
      - tests/**
      - scripts/**
      - playwright.config.ts
      - tsconfig.json
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags: "latest" on dev-qe, plus the commit SHA for a traceable,
      # immutable reference to exactly what got built.
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
